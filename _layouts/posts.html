---
layout: default
---
<p>If for whatever reason you want to keep up to date with the latest posts, you can subscribe to the RSS feed <a
        href="/feed.xml">here</a>.</p>
<ul>
    {% for post in site.posts %}
    <li>
        <span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{
            post.title }}</a> - By {{ post.author }}
    </li>
    {{ post.description }}
    {% endfor %}
</ul>
