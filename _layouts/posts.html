---
layout: default
---
{{ content }}
<ul class="no-point">
    {% for post in site.posts %}
    <li>
        <a href="{{ post.url }}" title="{{ post.title }}"><b>{{
                post.title }}</b></a>
        <div>
            <span>{{ post.author}} - {{ post.date | date_to_string }}</span>
        </div>
    </li>
    <p>{{ post.description }}</p>
    {% endfor %}
</ul>
