---
layout: default
---
{{ content }}
<ul class="nopoint">
    {% for repository in site.github.public_repositories %}
    <li>
        <a href="{{ repository.html_url }}" title="{{ repository.name }}"><b>{{ repository.name }}</b></a>
        <div>
            <span>{{ repository.language }} - {{ repository.license.name }}</span>
        </div>
    </li>
    <p>{{ repository.description }}</p>
    {% endfor %}
</ul>
